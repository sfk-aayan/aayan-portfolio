<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img">
  <title>SFK — drawing set registration mark</title>
  <desc>Blueprint registration mark: chalk crosshair and circle with a safety-orange center on deep print blue</desc>

  <!-- Sheet -->
  <rect width="32" height="32" fill="#0d2b4a"/>

  <!-- Hairline frame -->
  <rect x="2.5" y="2.5" width="27" height="27" fill="none" stroke="#e3edf7" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Crosshair -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#e3edf7" stroke-opacity="0.95" stroke-width="1.4"/>
  <line x1="5" y1="16" x2="27" y2="16" stroke="#e3edf7" stroke-opacity="0.95" stroke-width="1.4"/>

  <!-- Registration circle -->
  <circle cx="16" cy="16" r="6.75" fill="none" stroke="#e3edf7" stroke-opacity="0.95" stroke-width="1.4"/>

  <!-- Pen 02 — safety orange origin -->
  <circle cx="16" cy="16" r="2.6" fill="#e04f1a"/>
</svg>

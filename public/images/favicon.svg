<line x1="640" y1="640" x2="600" y2="640" stroke="#f5c400" stroke-width="1.5" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(245, 196, 0);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="640" y1="640" x2="640" y2="600" stroke="#f5c400" stroke-width="1.5" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(245, 196, 0);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

